name: Daily discovery crawl

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Pages to process in this discovery run
        required: false
        default: "500"
      min_quotes_goal:
        description: Keep crawling until at least this many new quotes are inserted
        required: false
        default: "50"
      max_runtime_minutes:
        description: Graceful runtime cap before GitHub timeout
        required: false
        default: "78"
      trigger:
        description: Trigger source label passed into the importer
        required: false
        default: "manual"

concurrency:
  group: daily-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install importer dependencies
        run: pip install -r importer/requirements.txt

      - name: Validate runtime secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing GitHub Actions secret DATABASE_URL. Add the Postgres connection string in GitHub repo settings under Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run discovery crawl
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
          QUOTEFLOW_INGEST_TRIGGER: ${{ inputs.trigger }}
        run: python importer/wikiquote_ingest.py --discover --limit ${{ inputs.limit }} --min-quotes-goal ${{ inputs.min_quotes_goal }} --max-runtime-minutes ${{ inputs.max_runtime_minutes }} --commit
